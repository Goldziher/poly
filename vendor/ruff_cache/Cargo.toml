[package]
name = "ruff_cache"
version = "0.0.3"
description = "Internal component crate of ruff (vendored into polylint)"
edition = "2024"
rust-version = "1.85"
license = "MIT"

[lib]
test = false

[package.metadata.cargo-machete]
ignored = ["ruff_macros", "serde"]

[dependencies]
filetime = "0.2"
glob = "0.3"
globset = "0.4"
itertools = "0.15"
regex = "1"
ruff_macros = { path = "../ruff_macros" }
seahash = "4.1"
serde = { version = "1", features = ["derive"] }
