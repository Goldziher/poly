# cargo-deny configuration for polylint/polyfmt.
# We ship permissive-only; no GPL/AGPL. Vendored sources must also be permissive
# and recorded in ATTRIBUTIONS.md.

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "MPL-2.0",
    "Zlib",
    "CC0-1.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "BSL-1.0",
    "OpenSSL",
]

[bans]
multiple-versions = "allow"
wildcards = "allow"

[advisories]
version = 2

[sources]
unknown-registry = "deny"
unknown-git = "deny"
