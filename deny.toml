
[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "MPL-2.0",
    "Zlib",
    "CC0-1.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "BSL-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
    "PSF-2.0",
]

# jarl-core's workspace Cargo.toml sets `license-file = "LICENSE.md"` but the
# actual file at the repo root is named `LICENSE` (no .md extension).
[[licenses.clarify]]
name = "jarl-core"
expression = "MIT"

[[licenses.clarify.license-files]]
path = "../../LICENSE"
hash = 0x3B9B906C

# MIT LICENSE file. `clarify` provides the XxHash32 of the LICENSE file so
[[licenses.clarify]]
name = "rubyfmt"
expression = "MIT"

[[licenses.clarify.license-files]]
# The rubyfmt package root is `librubyfmt/`; the LICENSE file lives in the
path = "../LICENSE"
hash = 0x3634FEBB

[bans]
multiple-versions = "allow"
wildcards = "allow"

[advisories]
version = 2
ignore = ["RUSTSEC-2024-0436", "RUSTSEC-2026-0173"]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/fables-tales/rubyfmt",
    "https://github.com/oxc-project/oxc",
    "https://github.com/astral-sh/ruff",
    "https://github.com/biomejs/biome",
]
