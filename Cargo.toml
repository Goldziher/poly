[workspace]
resolver = "3"
members = ["crates/polyfmt", "crates/polylint", "crates/polylint-core"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
license = "MIT OR Apache-2.0"
authors = ["Na'aman Hirschfeld <nhirschfeld@gmail.com>"]

[workspace.dependencies]
anyhow = "1"
blake3 = "1"
clap = { version = "4", features = ["derive"] }
dirs = "6"
ignore = "0.4"
insta = "1"
owo-colors = { version = "4", features = ["supports-colors"] }
polylint-core = { path = "crates/polylint-core" }
rayon = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
taplo = "0.14"
tempfile = "3"
thiserror = "2"
toml = "1.1"
toml_edit = "0.25"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }

[profile.release]
lto = "thin"
codegen-units = 1
