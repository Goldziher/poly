[workspace]
resolver = "3"
members = [
    "crates/conformance",
    "crates/poly-cli",
    "crates/polyfmt",
    "crates/polylint",
    "crates/polylint-core",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.96"
license = "MIT OR Apache-2.0"
authors = ["Na'aman Hirschfeld <nhirschfeld@gmail.com>"]

[workspace.dependencies]
# alejandra — Nix formatter (UNLICENSE, pure Rust via rnix); chosen over
# nixpkgs-fmt, which pulls unmaintained ansi_term/atty (cargo deny advisories)
alejandra = "3.1"
anyhow = "1"
blake3 = "1"
clap = { version = "4", features = ["derive"] }
graphql-parser = "0.4"
ignore = "0.4"
# insta snapshot testing
insta = "1"
# mago — tier-1 PHP linter + formatter backend (MIT OR Apache-2.0, v1.42.0)
# All eight crates are pinned to the same version for internal type consistency.
mago-allocator = { version = "=1.42.0" }
mago-database = { version = "=1.42.0" }
mago-formatter = { version = "=1.42.0" }
mago-linter = { version = "=1.42.0" }
mago-names = { version = "=1.42.0" }
mago-php-version = { version = "=1.42.0" }
mago-reporting = { version = "=1.42.0" }
mago-span = { version = "=1.42.0" }
mago-syntax = { version = "=1.42.0" }
mago-text-edit = { version = "=1.42.0" }
malva = "0.16"
markup_fmt = "0.27"
owo-colors = { version = "4", features = ["supports-colors"] }
# oxc git deps — all crates MUST share the same `rev` to keep the internal
# oxc_ast / oxc_span type graph consistent. Published versions are stale;
# oxc_formatter and oxc_formatter_core were never published to crates.io.
# Rev = latest HEAD of the oxc monorepo as of 2026-06-26.
oxc_allocator = { git = "https://github.com/oxc-project/oxc", rev = "5762638c8ec6981455ef6d7e9482d2ceca757829" }
oxc_diagnostics = { git = "https://github.com/oxc-project/oxc", rev = "5762638c8ec6981455ef6d7e9482d2ceca757829" }
oxc_formatter = { git = "https://github.com/oxc-project/oxc", rev = "5762638c8ec6981455ef6d7e9482d2ceca757829" }
oxc_formatter_core = { git = "https://github.com/oxc-project/oxc", rev = "5762638c8ec6981455ef6d7e9482d2ceca757829" }
oxc_formatter_json = { git = "https://github.com/oxc-project/oxc", rev = "5762638c8ec6981455ef6d7e9482d2ceca757829" }
oxc_linter = { git = "https://github.com/oxc-project/oxc", rev = "5762638c8ec6981455ef6d7e9482d2ceca757829" }
oxc_span = { git = "https://github.com/oxc-project/oxc", rev = "5762638c8ec6981455ef6d7e9482d2ceca757829" }
poly-cli = { path = "crates/poly-cli" }
polylint-core = { path = "crates/polylint-core" }
# pretty_graphql — g-plane pure-Rust GraphQL formatter (MIT); SDL + query docs
pretty_graphql = "0.2.3"
# pretty_yaml — g-plane pure-Rust YAML formatter (MIT); CST-based structural reflow
pretty_yaml = "0.6"
rayon = "1"
# ruff git deps — all crates MUST share the same `rev` to keep the internal
# ruff type graph consistent. The published 0.0.3 crates are stale; ruff_linter
# was never published to crates.io. Rev = HEAD of astral-sh/ruff as of 2026-06-27.
ruff_db = { git = "https://github.com/astral-sh/ruff", rev = "03f787e51e94999977b9a5a32b0153d82d7e2142" }
ruff_diagnostics = { git = "https://github.com/astral-sh/ruff", rev = "03f787e51e94999977b9a5a32b0153d82d7e2142" }
ruff_formatter = { git = "https://github.com/astral-sh/ruff", rev = "03f787e51e94999977b9a5a32b0153d82d7e2142" }
ruff_linter = { git = "https://github.com/astral-sh/ruff", rev = "03f787e51e94999977b9a5a32b0153d82d7e2142" }
ruff_python_ast = { git = "https://github.com/astral-sh/ruff", rev = "03f787e51e94999977b9a5a32b0153d82d7e2142" }
ruff_python_formatter = { git = "https://github.com/astral-sh/ruff", rev = "03f787e51e94999977b9a5a32b0153d82d7e2142" }
ruff_python_parser = { git = "https://github.com/astral-sh/ruff", rev = "03f787e51e94999977b9a5a32b0153d82d7e2142" }
ruff_source_file = { git = "https://github.com/astral-sh/ruff", rev = "03f787e51e94999977b9a5a32b0153d82d7e2142" }
ruff_text_size = { git = "https://github.com/astral-sh/ruff", rev = "03f787e51e94999977b9a5a32b0153d82d7e2142" }
rumdl = { version = "0.2", default-features = false }
# saphyr — pure-Rust YAML parser, used by the yaml backend for validity lint
saphyr = "0.0.6"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
# serde_toon_format — TOON (Token-Oriented Object Notation) serde serializer
# for the `--format toon` output renderer
serde_toon_format = "0.1"
sqruff-lib = "0.38"
sqruff-lib-core = "0.38"
taplo = "0.14"
tempfile = "3"
thiserror = "2"
toml = "1.1"
toml_edit = "0.25"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
# tree-sitter-language-pack — tier-2 generic formatter; default features
# (dynamic-loading + download) fetch grammars from GitHub releases on demand
tree-sitter-language-pack = "1.10"
# typos + typos-dict — cross-cutting spell-check backend
typos = "0.10"
typos-dict = "0.13"
unicase = "2"

[profile.release]
lto = "thin"
codegen-units = 1
