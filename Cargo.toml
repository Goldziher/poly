[workspace]
resolver = "3"
members = ["crates/polyfmt", "crates/polylint", "crates/polylint-core"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
license = "MIT OR Apache-2.0"
authors = ["Na'aman Hirschfeld <nhirschfeld@gmail.com>"]

[workspace.dependencies]
# alejandra — Nix formatter (UNLICENSE, pure Rust via rnix); chosen over
# nixpkgs-fmt, which pulls unmaintained ansi_term/atty (cargo deny advisories)
alejandra = "3.1"
anyhow = "1"
blake3 = "1"
clap = { version = "4", features = ["derive"] }
dirs = "6"
graphql-parser = "0.4"
ignore = "0.4"
# insta snapshot testing
insta = "1"
malva = "0.16"
markup_fmt = "0.27"
owo-colors = { version = "4", features = ["supports-colors"] }
# oxc published crates — used by the oxc backend (M2)
oxc_allocator = "0.137"
oxc_codegen = "0.137"
oxc_parser = "0.137"
oxc_span = "0.137"
polylint-core = { path = "crates/polylint-core" }
rayon = "1"
# ruff component crates (published to crates.io by astral-sh) — used by the
# ruff Python backend (M3)
ruff_formatter = "0.0.3"
ruff_python_formatter = "0.0.3"
ruff_python_parser = "0.0.3"
ruff_source_file = "0.0.3"
rumdl = { version = "0.2", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
sqruff-lib = "0.38"
sqruff-lib-core = "0.38"
taplo = "0.14"
tempfile = "3"
thiserror = "2"
toml = "1.1"
toml_edit = "0.25"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
# tree-sitter-language-pack — tier-2 generic formatter; default features
# (dynamic-loading + download) fetch grammars from GitHub releases on demand
tree-sitter-language-pack = "1.10"

[profile.release]
lto = "thin"
codegen-units = 1
