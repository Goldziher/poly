[package]
name = "polylint-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "Core engine for the polylint/polyfmt universal, zero-dependency linter & formatter"

[package.metadata.cargo-machete]
# rumdl's lib crate name is rumdl_lib; cargo-machete cannot detect the usage
# via the package name.
ignored = ["rumdl"]

[lib]
name = "polylint_core"
path = "src/lib.rs"

[dependencies]
anyhow.workspace = true
blake3.workspace = true
dirs.workspace = true
ignore.workspace = true
owo-colors.workspace = true
# oxc backend (M2) — all published crates, no git deps
oxc_allocator.workspace = true
oxc_codegen.workspace = true
oxc_parser.workspace = true
oxc_span.workspace = true
rayon.workspace = true
rumdl.workspace = true
serde.workspace = true
serde_json.workspace = true
taplo.workspace = true
toml.workspace = true

[dev-dependencies]
insta.workspace = true
tempfile.workspace = true
