name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      matrix:
        include:
          # Linux x86_64 gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false

          # Linux x86_64 musl
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true

          # Linux aarch64 gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true

          # macOS x86_64
          - os: macos-13
            target: x86_64-apple-darwin
            use_cross: false

          # macOS aarch64 (Apple Silicon)
          - os: macos-14
            target: aarch64-apple-darwin
            use_cross: false

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          cache-directories: target
          key: ${{ matrix.target }}

      - name: Install cross (if needed)
        if: matrix.use_cross
        run: cargo install cross

      - name: Build binaries
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Strip binaries
        run: |
          case "${{ matrix.target }}" in
            *windows*)
              # Windows binaries don't benefit from strip
              ;;
            *)
              strip target/${{ matrix.target }}/release/poly || true
              strip target/${{ matrix.target }}/release/polylint || true
              strip target/${{ matrix.target }}/release/polyfmt || true
              ;;
          esac
        shell: bash

      - name: Create release artifacts
        run: |
          cd target/${{ matrix.target }}/release

          case "${{ matrix.target }}" in
            *windows*)
              7z a ../../../poly-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.zip poly.exe polylint.exe polyfmt.exe
              ;;
            *)
              tar czf ../../../poly-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.tar.gz poly polylint polyfmt
              ;;
          esac
        shell: bash

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            poly-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.tar.gz
            poly-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.zip
          tag_name: v${{ needs.create-release.outputs.version }}

      - name: Save artifact for checksums
        uses: actions/upload-artifact@v4
        with:
          name: releases
          path: poly-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.*
          if-no-files-found: ignore

  checksums:
    name: Generate Checksums
    runs-on: ubuntu-latest
    needs: [create-release, build]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: releases
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; | sort > sha256sums.txt
          cat sha256sums.txt

      - name: Upload checksums to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/sha256sums.txt
          tag_name: v${{ needs.create-release.outputs.version }}
