name: Publish Packages

on:
  push:
    tags:
      - v[0-9]+.*
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g., v0.1.0)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# id-token: write is required for npm provenance and PyPI trusted publishing (OIDC).
permissions:
  contents: write
  id-token: write

jobs:
  meta:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_assets_exist: ${{ steps.release_assets.outputs.release_assets_exist }}
      npm_exists: ${{ steps.published.outputs.npm_exists }}
      pypi_exists: ${{ steps.published.outputs.pypi_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi

          version="${tag#v}"

          {
            echo "version=$version"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

          echo "Git tag: $tag"
          echo "Cargo version: $version"

      - name: Verify version consistency
        run: |
          set -euo pipefail
          target_version="${{ steps.version.outputs.version }}"

          echo "Verifying version consistency for: $target_version"

          # Check Cargo.toml workspace version
          cargo_version="$(grep -E '^version = "' Cargo.toml | head -1 | cut -d'"' -f2)"
          if [ "$cargo_version" != "$target_version" ]; then
            echo "::error::Cargo.toml version mismatch: expected $target_version, got $cargo_version"
            exit 1
          fi

          # Check npm-package/package.json (the npm wrapper ships in lock-step)
          if [ -f npm-package/package.json ]; then
            npm_version="$(jq -r '.version' npm-package/package.json)"
            if [ "$npm_version" != "$target_version" ]; then
              echo "::error::npm-package/package.json version mismatch: expected $target_version, got $npm_version"
              exit 1
            fi
          fi

          # Check pip-package/pyproject.toml
          if [ -f pip-package/pyproject.toml ]; then
            pypi_version="$(grep -E '^version = "' pip-package/pyproject.toml | head -1 | cut -d'"' -f2)"
            if [ "$pypi_version" != "$target_version" ]; then
              echo "::error::pip-package/pyproject.toml version mismatch: expected $target_version, got $pypi_version"
              exit 1
            fi
          fi

          # Check pip-package/polylint/__init__.py
          if [ -f pip-package/polylint/__init__.py ]; then
            init_version="$(grep -E '^__version__ = "' pip-package/polylint/__init__.py | cut -d'"' -f2)"
            if [ "$init_version" != "$target_version" ]; then
              echo "::error::pip-package/polylint/__init__.py version mismatch: expected $target_version, got $init_version"
              exit 1
            fi
          fi

          echo "✓ Version verified across Cargo + npm + pip: $cargo_version"

      - name: Detect already-published package versions
        id: published
        run: |
          version="${{ steps.version.outputs.version }}"

          npm_exists=false
          if npm view "@nhirschfeld/polylint@${version}" version >/dev/null 2>&1; then
            npm_exists=true
          fi

          pypi_exists=false
          if curl -fsS "https://pypi.org/pypi/polylint/${version}/json" >/dev/null; then
            pypi_exists=true
          fi

          {
            echo "npm_exists=$npm_exists"
            echo "pypi_exists=$pypi_exists"
          } >> "$GITHUB_OUTPUT"

          echo "Already published? npm(@nhirschfeld/polylint)=$npm_exists  PyPI(polylint)=$pypi_exists"

      - name: Detect existing GitHub release assets
        id: release_assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          release_assets_exist=false

          if gh release view "$tag" >/dev/null 2>&1; then
            count="$(gh release view "$tag" --json assets --jq '.assets | length')"
            if [ "${count:-0}" -gt 0 ]; then
              release_assets_exist=true
            fi
          fi

          echo "release_assets_exist=$release_assets_exist" >> "$GITHUB_OUTPUT"
          echo "GitHub release assets exist? $release_assets_exist"

  create_release:
    name: Create GitHub release
    needs: meta
    if: needs.meta.outputs.release_assets_exist != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

      - name: Ensure the GitHub release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.meta.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists."
          else
            prerelease=""
            case "$tag" in
              *-rc.* | *-beta* | *-alpha*) prerelease="--prerelease" ;;
            esac
            # Create as a DRAFT. The build matrix uploads binaries to it, but it
            # stays invisible (assets not publicly downloadable) until the
            # finalize_release job promotes it — and that job only runs once
            # checksums (which requires all platform binaries) succeeds. A failed
            # platform build therefore leaves a hidden draft, not a live release
            # with missing binaries and no checksums.
            gh release create "$tag" --title "$tag" --notes "Release $tag" --verify-tag --draft $prerelease
          fi

  build-binaries:
    name: Build binaries / ${{ matrix.triple }}
    needs: [meta, create_release]
    if: needs.meta.outputs.release_assets_exist != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 gnu (native)
          - triple: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          # Linux aarch64 gnu (native arm64 runner — no cross needed)
          - triple: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          # Linux x86_64 musl (built in an Alpine container; cross images lack the
          # libc headers ruby-prism-sys's bindgen step needs — sys/cdefs.h/limits.h)
          - triple: x86_64-unknown-linux-musl
            os: ubuntu-latest
            alpine: true
          # macOS x86_64
          - triple: x86_64-apple-darwin
            os: macos-13
          # macOS aarch64 (Apple Silicon)
          - triple: aarch64-apple-darwin
            os: macos-14
          # Windows x86_64
          - triple: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

      - name: Setup Rust
        if: ${{ !matrix.alpine }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Setup cache
        if: ${{ !matrix.alpine }}
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.triple }}

      # ruby-prism-sys runs bindgen at build time and needs libclang + libc
      # headers; native Linux runners get them from apt.
      - name: Install clang for bindgen (Linux)
        if: ${{ runner.os == 'Linux' && !matrix.alpine }}
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev
        shell: bash

      - name: Build binary (native)
        if: ${{ !matrix.alpine }}
        run: cargo build --release --target ${{ matrix.triple }}
        shell: bash

      # musl: build in the official rust:alpine image (musl-native), so prism's
      # bindgen finds musl headers + libclang. -crt-static makes build scripts
      # dynamically linked so they can dlopen libclang (the binary then links musl
      # dynamically — correct for Alpine). `cross` lacked the libc headers.
      - name: Build binary (musl, Alpine container)
        if: ${{ matrix.alpine }}
        run: |
          # Build host-native inside rust:alpine (the image's host target already
          # IS x86_64-unknown-linux-musl). NOT `--target`: with an explicit target
          # Cargo applies RUSTFLAGS only to the target, leaving build scripts
          # static-musl — and ruby-prism-sys's bindgen build script must be
          # dynamically linked (-crt-static off) to dlopen libclang. Building
          # host-native applies the flag everywhere. Then place the binary at the
          # triple path the shared packaging step expects.
          docker run --rm -v "$PWD":/work -w /work \
            -e CARGO_TARGET_DIR=/work/target \
            -e LIBCLANG_PATH=/usr/lib \
            -e RUSTFLAGS="-C target-feature=-crt-static" \
            rust:alpine sh -c '
              set -e
              apk add --no-cache build-base musl-dev clang clang-dev llvm-dev pkgconf git perl
              cargo build --release
              mkdir -p "target/${{ matrix.triple }}/release"
              cp target/release/poly "target/${{ matrix.triple }}/release/poly"
              strip "target/${{ matrix.triple }}/release/poly"
            '
        shell: bash

      - name: Strip binary
        if: ${{ !matrix.alpine }}
        run: |
          case "${{ matrix.triple }}" in
            *windows*)
              # Windows binaries don't benefit from strip
              ;;
            *)
              strip target/${{ matrix.triple }}/release/poly || true
              ;;
          esac
        shell: bash

      - name: Create release artifacts
        run: |
          cd target/${{ matrix.triple }}/release

          case "${{ matrix.triple }}" in
            *windows*)
              7z a ../../../poly-${{ needs.meta.outputs.version }}-${{ matrix.triple }}.zip poly.exe
              ;;
            *)
              tar czf ../../../poly-${{ needs.meta.outputs.version }}-${{ matrix.triple }}.tar.gz poly
              ;;
          esac
        shell: bash

      - name: Upload release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.meta.outputs.tag }}"

          case "${{ matrix.triple }}" in
            *windows*)
              archive="poly-${{ needs.meta.outputs.version }}-${{ matrix.triple }}.zip"
              ;;
            *)
              archive="poly-${{ needs.meta.outputs.version }}-${{ matrix.triple }}.tar.gz"
              ;;
          esac

          if [ ! -f "$archive" ]; then
            echo "::error::Archive not found: $archive"
            exit 1
          fi

          gh release upload "$tag" "$archive" --clobber
        shell: bash

      - name: Save artifact for checksums
        uses: actions/upload-artifact@v4
        with:
          name: releases
          path: |
            poly-${{ needs.meta.outputs.version }}-${{ matrix.triple }}.tar.gz
            poly-${{ needs.meta.outputs.version }}-${{ matrix.triple }}.zip
          if-no-files-found: ignore

  checksums:
    name: Generate and upload checksums
    needs: [meta, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: releases
          path: artifacts

      - name: Verify all expected archives are present
        run: |
          set -euo pipefail

          # Expected archives for the 6 build targets
          expected=(
            "poly-${{ needs.meta.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz"
            "poly-${{ needs.meta.outputs.version }}-x86_64-unknown-linux-musl.tar.gz"
            "poly-${{ needs.meta.outputs.version }}-aarch64-unknown-linux-gnu.tar.gz"
            "poly-${{ needs.meta.outputs.version }}-x86_64-apple-darwin.tar.gz"
            "poly-${{ needs.meta.outputs.version }}-aarch64-apple-darwin.tar.gz"
            "poly-${{ needs.meta.outputs.version }}-x86_64-pc-windows-msvc.zip"
          )

          missing_count=0
          for expected_asset in "${expected[@]}"; do
            if [ ! -f "artifacts/$expected_asset" ]; then
              echo "::error::Missing expected archive: $expected_asset"
              missing_count=$((missing_count + 1))
            fi
          done

          if [ $missing_count -gt 0 ]; then
            echo "::error::Release is incomplete: $missing_count of 6 platform archives missing. The release must have all 6 binaries before checksums can be generated."
            exit 1
          fi

          echo "✓ All 6 expected archives present"

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; | sort > ../sha256sums.txt
          cat ../sha256sums.txt

      - name: Upload checksums to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.meta.outputs.tag }}"
          gh release upload "$tag" sha256sums.txt --clobber

  finalize_release:
    name: Publish GitHub release
    needs: [meta, checksums]
    if: always() && needs.meta.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Promote draft to published release once complete
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.meta.outputs.tag }}"
          version="${{ needs.meta.outputs.version }}"

          # The full asset set the installer needs: every platform archive plus
          # the checksums file they verify against.
          required=(
            "poly-${version}-x86_64-unknown-linux-gnu.tar.gz"
            "poly-${version}-x86_64-unknown-linux-musl.tar.gz"
            "poly-${version}-aarch64-unknown-linux-gnu.tar.gz"
            "poly-${version}-x86_64-apple-darwin.tar.gz"
            "poly-${version}-aarch64-apple-darwin.tar.gz"
            "poly-${version}-x86_64-pc-windows-msvc.zip"
            "sha256sums.txt"
          )

          gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets -q '.assets[].name' \
            > /tmp/assets.txt || true
          missing=0
          for asset in "${required[@]}"; do
            if ! grep -qx "$asset" /tmp/assets.txt; then
              echo "::error::release $tag is missing $asset"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::release $tag is incomplete ($missing required assets missing); leaving it as a draft"
            exit 1
          fi

          gh release edit "$tag" --draft=false --repo "$GITHUB_REPOSITORY"
          echo "✓ Promoted $tag to a published release"

  publish_homebrew:
    name: Update Homebrew formula
    # Stable releases only — rc/beta/alpha pre-releases do not update the tap.
    # Runs after the release is finalized (all assets present, draft promoted),
    # since the formula points at the published release assets.
    needs: [meta, finalize_release]
    if: needs.finalize_release.result == 'success' && !contains(needs.meta.outputs.version, '-rc') && !contains(needs.meta.outputs.version, '-beta') && !contains(needs.meta.outputs.version, '-alpha')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

      - name: Generate formula and push to tap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TOKEN:-}" ]; then
            echo "HOMEBREW_TOKEN not set — skipping the Homebrew formula update."
            exit 0
          fi
          tag="${{ needs.meta.outputs.tag }}"
          version="${{ needs.meta.outputs.version }}"

          gh release download "$tag" -p "sha256sums.txt" -O checksums.txt
          ./scripts/update-homebrew-formula.sh "$version" checksums.txt > polylint.rb

          git clone --depth 1 "https://x-access-token:${HOMEBREW_TOKEN}@github.com/Goldziher/homebrew-tap.git" tap
          cp polylint.rb tap/Formula/polylint.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/polylint.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
          else
            git commit -m "polylint ${version}"
            git push
          fi

  publish_npm:
    name: Publish npm (@nhirschfeld/polylint)
    # Gated on finalize_release: npm-package/install.js downloads the platform
    # binary from the GitHub release, so it must not publish until that release
    # is live. Skipped if this version is already on npm.
    needs: [meta, finalize_release]
    if: needs.finalize_release.result == 'success' && needs.meta.outputs.npm_exists != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: |
          set -euo pipefail
          version="${{ needs.meta.outputs.version }}"
          case "$version" in
            *-rc.* | *-beta* | *-alpha*) npm_tag="next" ;;
            *) npm_tag="latest" ;;
          esac
          cd npm-package
          # --provenance attaches a signed build-provenance attestation (uses the
          # job's id-token). Trusted publishing means no NODE_AUTH_TOKEN is set.
          npm publish --provenance --access public --tag "$npm_tag"

  publish_pypi:
    name: Publish PyPI (polylint)
    # Gated on finalize_release: the pip downloader fetches the platform binary
    # from the GitHub release, so it must not publish until that release is live.
    needs: [meta, finalize_release]
    if: needs.finalize_release.result == 'success' && needs.meta.outputs.pypi_exists != 'true'
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python package
        run: |
          python -m pip install --upgrade pip build
          cd pip-package
          python -m build

      - name: Publish to PyPI
        # Trusted publishing (OIDC) — no API token; configure the publisher on PyPI.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pip-package/dist
          skip-existing: true

  update_major_tag:
    name: Move the major version tag
    # So consumers can pin the GitHub Action to a moving major tag (e.g.
    # `Goldziher/polylint@v0`) that tracks the latest release in that series.
    # Stable releases only; runs once the release is finalized. The major tag
    # (v0, v1, …) does NOT match the `v[0-9]+.*` push trigger, so force-moving it
    # never re-triggers this workflow.
    needs: [meta, finalize_release]
    if: needs.finalize_release.result == 'success' && !contains(needs.meta.outputs.version, '-rc') && !contains(needs.meta.outputs.version, '-beta') && !contains(needs.meta.outputs.version, '-alpha')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

      - name: Move major tag to this release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ needs.meta.outputs.version }}"
          tag="${{ needs.meta.outputs.tag }}"
          major="v${version%%.*}"
          sha="$(git rev-list -n1 "$tag")"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$major" "$sha"
          git push -f origin "refs/tags/${major}"
          echo "Moved ${major} → ${tag} (${sha})"
