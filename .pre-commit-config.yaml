default_install_hook_types:
  - pre-commit
  - commit-msg
default_stages:
  - pre-commit
# The conformance corpus is intentionally unformatted and its golden files are
# the exact byte output of reference formatters — no hook may rewrite them.
exclude: ^(target/|crates/conformance/(corpus|golden)/)

repos:
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args:
          - --write
        stages:
          - commit-msg

  - repo: https://github.com/xberg-io/pre-commit-hooks
    rev: v3.0.0
    hooks:
      # File safety
      - id: trailing-whitespace
        # Test fixtures intentionally contain bad content (trailing whitespace,
        # malformed headings, etc.) and insta snapshots capture exact formatter
        # output (which may legitimately end a line with whitespace, e.g. a
        # Markdown hard break) — exclude both from fixable hooks so known-bad
        # inputs and recorded outputs survive the commit pipeline.
        exclude: ^crates/[^/]+/tests/(fixtures|snapshots)/
      - id: end-of-file-fixer
        exclude: ^crates/[^/]+/tests/(fixtures|snapshots)/
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: mixed-line-ending
        exclude: ^crates/[^/]+/tests/(fixtures|snapshots)/
      - id: typos
        args:
          - --force-exclude
      - id: check-json
      - id: check-yaml
      - id: check-toml

      # Shell
      - id: shfmt
        args:
          - -w
          - -i
          - "2"
      - id: shellcheck

      # Markdown
      - id: rumdl-fmt
        # Test fixtures intentionally contain bad Markdown — exclude them.
        exclude: ^crates/[^/]+/tests/fixtures/
      - id: markdownlint-rumdl-strict
        # .ai-rulez/ prose is rendered into many tool-native formats; long lines
        # there are expected and respected by ai-rulez's own templates.
        # Test fixtures intentionally contain bad Markdown.
        exclude: ^(\.ai-rulez|crates/[^/]+/tests/fixtures)/

      # Rust
      - id: cargo-fmt
        args:
          - --all
      - id: cargo-clippy
        args:
          - --fix
          - --allow-dirty
          - --allow-staged
          - --all-targets
          - --
          - -D
          - warnings
      - id: cargo-sort
      - id: cargo-machete
      - id: cargo-deny
        args:
          - check
      - id: rustdoc-lint
      # 1,000 LOC ceiling per .rs file — split early.
      - id: rust-max-lines
        args:
          - --max=1000
